<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Route Details - Nitte Campus</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="route-detail.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231e3a8a'/%3E%3Ctext x='50' y='65' font-size='50' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'%3EN%3C/text%3E%3C/svg%3E" alt="Nitte Logo" class="logo-img">
                <span class="logo-text">Nitte Campus</span>
            </div>
        </div>

        <div class="header-center">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search bus name, from, or to...">
                <i class="fas fa-search"></i>
            </div>
        </div>

        <div class="header-right">
            <div class="custom-dropdown" id="busesDropdown">
                <button class="dropdown-btn" id="busesBtn">All Buses 🚌</button>
                <div class="dropdown-menu" id="busesMenu"></div>
            </div>

            <div class="custom-dropdown" id="stopsDropdown">
                <button class="dropdown-btn" id="stopsBtn">Select Nearest Stop ⊝</button>
                <div class="dropdown-menu" id="stopsMenu"></div>
            </div>

            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-item" data-page="home">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="#" class="sidebar-item active" data-page="routes">
                <i class="fas fa-map-location-dot"></i>
                <span>Bus Routes</span>
            </a>
            <a href="index.html" class="sidebar-item" data-page="timetable">
                <i class="fas fa-clock"></i>
                <span>Timetable View</span>
            </a>
            <a href="index.html" class="sidebar-item" data-page="about">
                <i class="fas fa-circle-info"></i>
                <span>About</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="route-detail-wrapper">
            <div class="route-header">
                <a href="index.html" class="back-btn">← Back</a>
                <h1 id="routeTitle"></h1>
                <p id="routeSubtitle"></p>
            </div>

            <div class="route-content">
                <!-- Map Section -->
                <div class="map-section">
                    <div id="map"></div>
                </div>

                <!-- Zoom Controls -->
                <div class="zoom-controls">
                    <button id="zoomIn" class="zoom-btn">+</button>
                    <button id="zoomOut" class="zoom-btn">−</button>
                </div>
            </div>

            <!-- Stops Section -->
            <div class="stops-section">
                <h2><i class="fas fa-clock"></i> Timetable</h2>
                <div class="stops-table">
                    <table id="stopsTable">
                        <thead>
                            <tr>
                                <th>Stop No</th>
                                <th>Stop Name</th>
                                <th>Arrival</th>
                                <th>Departure</th>
                            </tr>
                        </thead>
                        <tbody id="stopsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="route-detail.js"></script>
</body>
</html>
